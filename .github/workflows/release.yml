# Reusable workflow: docker/github-builder.
# Distributes per-platform builds to native runners, assembles the multi-arch
# manifest, and signs SLSA provenance + SBOM attestations.
# Docs: https://docs.docker.com/build/ci/github-actions/github-builder/

name: Create and publish a Docker image

on:
  release:
    types: [published]

jobs:
  build:
    uses: docker/github-builder/.github/workflows/build.yml@c2782c55efa56a01b9c30021db8f5ec3993228a3 # v1.8.0
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      target: production
      meta-images: ghcr.io/${{ github.repository }}
      set-meta-annotations: true
      set-meta-labels: true
      cache: true
      cache-mode: max
      sbom: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
