# lernkit-Fork: baut das Prod-Image (amd64) → GHCR :latest und triggert danach
# den Server-Redeploy per SSH-Forced-Command (umgeht Coolifys :latest-Cache-Problem,
# analog zum Badge-Repo). Unabhängig von Upstream ci.yml/playwright.yml/release.yml
# (die dürfen bleiben oder in den Repo-Settings deaktiviert werden → CI-Kosten sparen).
#
# WICHTIG: Der `build`-Job läuft bei jedem Push auf main und baut/pusht das Image
# (nützlich auch schon vor dem Server-Setup). Der `deploy`-Job läuft ERST, wenn die
# Repo-Variable DEPLOY_ENABLED == 'true' gesetzt ist (nach Secrets + Server-Setup) —
# so schlägt der erste Push nicht rot fehl.
name: lernkit build + deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: production        # Upstream-Dockerfile-Stage (siehe release.yml)
          platforms: linux/amd64    # Hetzner = amd64; single-arch = schnellere CI
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Redeploy maps.lernkit.de auslösen
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            root@${{ secrets.DEPLOY_HOST }} deploy
