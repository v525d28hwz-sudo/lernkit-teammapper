packages:
  - 'teammapper-backend'
  - 'teammapper-frontend'
  - 'teammapper-frontend/packages/*'
# 7-day quarantine on newly published versions (mitigates fast-revoked malicious releases).
minimumReleaseAge: 10080
strictDepBuilds: true
allowBuilds:
  '@compodoc/compodoc': false
  '@nestjs/core': false
  '@parcel/watcher': true
  core-js: false
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  unrs-resolver: false
# Transitive-dep CVE pins. Audit periodically with `pnpm why <pkg>` and remove
# entries whose selector no longer matches any node in pnpm-lock.yaml.
overrides:
  'multer@<2.1.1': '2.1.1'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '8.18.0'
  'underscore@<=1.13.7': '1.13.8'
  'socket.io-parser@>=4.0.0 <4.2.6': '4.2.6'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'lodash@<4.18.0': '>=4.18.0'
  'follow-redirects@<1.16.0': '>=1.16.0'
  'hono@<4.12.25': '>=4.12.25'
  'fast-uri@<3.1.2': '>=3.1.2'
  'postcss@<8.5.10': '>=8.5.10'
  '@babel/plugin-transform-modules-systemjs@<7.29.4': '>=7.29.4'
  'uuid@>=11.0.0 <11.1.1': '>=11.1.1'
  # The entries below are transitive deps pinned to vulnerable versions by the
  # Angular build toolchain (@angular/build, webpack-dev-server) and other
  # parents. The parents have no released version that resolves them above the
  # CVE range — even @angular/build@21.2.16 still pins vite 7.3.2 / esbuild
  # 0.27.3 / piscina 5.1.4 / @babel/core 7.29.0 — so an override is the only fix.
  # Values are upper-bounded to the current major to avoid an unintended
  # major-version jump (e.g. @babel/core -> 8) when newer releases age out.
  'shell-quote@<1.8.4': '>=1.8.4 <2.0.0'
  'qs@>=6.11.1 <6.15.2': '>=6.15.2 <7.0.0'
  'esbuild@>=0.27.3 <0.28.1': '>=0.28.1 <0.29.0'
  'tar@>=7.0.0 <7.5.16': '>=7.5.16 <8.0.0'
  'launch-editor@<2.14.1': '>=2.14.1 <3.0.0'
  # Scoped to the 4.x line only: @istanbuljs/load-nyc-config pulls js-yaml@3 and
  # relies on the v3-only safeLoad API, so it must not be forced up to v4.
  'js-yaml@>=4.0.0 <4.2.0': '>=4.2.0 <5.0.0'
  '@babel/core@>=7.0.0 <7.29.6': '>=7.29.6 <8.0.0'
  'piscina@>=5.0.0-alpha.0 <5.1.5': '>=5.1.5 <6.0.0'
  'vite@>=7.0.0 <7.3.5': '>=7.3.5 <8.0.0'
  'dompurify@>=3.0.0 <3.4.9': '>=3.4.9 <4.0.0'
